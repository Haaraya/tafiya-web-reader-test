<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tafiya Web Reader Library</title>
  <style>
    body {
      margin: 0;
      background: #f4f4f4;
      font-family: Andika, system-ui, sans-serif;
      color: #111;
    }

    .library-shell {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    .brand {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 34px;
      line-height: 1.1;
    }

    .intro {
      margin: 0 0 28px;
      font-size: 17px;
      line-height: 1.45;
      max-width: 560px;
    }

    .book-list {
      display: grid;
      gap: 16px;
    }

    .book-card {
      display: block;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 18px;
      padding: 20px;
      color: inherit;
      text-decoration: none;
      box-shadow: 0 8px 22px rgba(0,0,0,0.06);
    }

    .book-card:hover {
      border-color: #111;
    }

    .book-code {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .book-title {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 6px;
    }

    .book-meta {
      font-size: 15px;
      opacity: 0.75;
    }
  </style>
</head>

<body>
  <main class="library-shell">
    <div class="brand">Tafiya · Haaraya Literacy</div>
    <h1>Book Library</h1>
    <p class="intro">Choose a book to open the web reader.</p>

    <section class="book-list">
      <a class="book-card" href="reader/index.html?book=T4-NF-01">
        <div class="book-code">T4-NF-01</div>
        <div class="book-title">How We Cook Jollof Rice</div>
        <div class="book-meta">Tafiya · Level 4 · Non-Fiction</div>
      </a>

      <a class="book-card" href="reader/index.html?book=T4-NF-02">
        <div class="book-code">T4-NF-02</div>
        <div class="book-title">The Keke Napep</div>
        <div class="book-meta">Tafiya · Level 4 · Non-Fiction</div>
      </a>
    </section>
  </main>
</body>
</html>
